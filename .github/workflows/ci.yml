name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        features:
          - ""
          - "--no-default-features --features replacement_clock,page-4k"
          - "--no-default-features --features replacement_sieve,page-4k"
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: rustfmt, clippy
    
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    
    - name: Build
      run: cargo build --verbose ${{ matrix.features }}
    
    - name: Run tests
      run: cargo test --verbose ${{ matrix.features }}

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Run clippy
      run: cargo clippy ${{ matrix.features }} -- -D warnings

  benchmarks:
    name: Benchmarks
    runs-on:
      - self-hosted
      - Linux
    needs: test
    if: |
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
    - uses: actions/checkout@v4

    - name: Setup PATH
      run: echo "$HOME/.cargo/bin:$HOME/.local/bin" >> $GITHUB_PATH

    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - uses: bencherdev/bencher@main

    - name: Build (release)
      run: cargo build --release

    - name: Run benchmarks (push to master)
      if: github.event_name == 'push'
      run: |
        for bench in buffer_pool io_patterns simple_bench; do
          bencher run \
            --project simpledb \
            --token "${{ secrets.BENCHER_API_TOKEN }}" \
            --branch "${{ github.ref_name }}" \
            --testbed self-hosted \
            --adapter rust_criterion \
            --threshold-measure latency \
            --threshold-test t_test \
            --threshold-upper-boundary 0.95 \
            --github-actions "${{ secrets.GITHUB_TOKEN }}" \
            "SIMPLEDB_BENCH_BUFFERS=12 cargo bench --bench $bench -- --noplot"
        done

    - name: Run benchmarks (PR)
      if: github.event_name == 'pull_request'
      run: |
        for bench in buffer_pool io_patterns simple_bench; do
          bencher run \
            --project simpledb \
            --token "${{ secrets.BENCHER_API_TOKEN }}" \
            --branch "${{ github.head_ref }}" \
            --start-point "${{ github.base_ref }}" \
            --start-point-hash "${{ github.event.pull_request.base.sha }}" \
            --start-point-clone-thresholds \
            --start-point-reset \
            --testbed self-hosted \
            --adapter rust_criterion \
            --github-actions "${{ secrets.GITHUB_TOKEN }}" \
            "SIMPLEDB_BENCH_BUFFERS=12 cargo bench --bench $bench -- --noplot"
        done

    - name: Upload Criterion reports
      uses: actions/upload-artifact@v4
      with:
        name: criterion-reports
        path: target/criterion/
        retention-days: 30
